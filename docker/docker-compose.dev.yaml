name: blog
services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../frontend/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - minio
    networks:
      - blog-network

  frontend:
    build:
      context: ../frontend
      dockerfile: dockerfile.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blog-network

  backend:
    build:
      context: ../backend
      dockerfile: dockerfile.dev
    env_file: ../backend/.env
    volumes:
      - ../backend:/app
      - /app/node_modules
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - db
      - minio
    networks:
      - blog-network

  db:
    build:
      context: ../db
      dockerfile: dockerfile
    container_name: blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - blog_postgres_data:/var/lib/postgresql
    networks:
      - blog-network

  minio:
    image: minio/minio
    container_name: blog-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - blog_minio_data:/data
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  blog_postgres_data:
  blog_minio_data: